business:
  name: "Apex Properties"
  industry: "Real Estate"
  tagline: "Premium property sales and lettings in Lagos"
  greeting: "Hi! Welcome to Apex Properties. What can I help you with today?"
  brand_color: "#4F46E5"

services:
  - name: "Property Purchase"
    price_range: "₦25,000,000 and above"
    duration: "2-8 weeks to close"
  - name: "Property Letting / Rental"
    price_range: "₦800,000 - ₦15,000,000 per annum"
    duration: "1-2 weeks to move in"
  - name: "Property Sale (Listing)"
    price_range: "5% agency commission"
    duration: "4-12 weeks average"
  - name: "Property Valuation"
    price_range: "₦50,000 - ₦150,000"
    duration: "24-48 hours"
  - name: "Investment Advisory"
    price_range: "Free consultation"
    duration: "1 hour session"

faqs:
  - q: "Where are your listings located?"
    a: "We cover Lekki, Victoria Island, Ikoyi, Ajah, Ikeja GRA, and Magodo."
  - q: "Do you handle shortlets?"
    a: "Yes, shortlet options in Lekki and VI from ₦80,000 per night."
  - q: "Can you help with documentation?"
    a: "Yes — C of O, deed of assignment, and all transaction documentation."
  - q: "Do you work with mortgage?"
    a: "Yes, we partner with several banks and mortgage institutions."
  - q: "What are your office hours?"
    a: "Monday–Friday 8am–6pm, Saturday 10am–3pm."

scoring:
  rules: |
    Score the lead 1-10 based on:
    - Urgency: "immediately/this month" = high, "next 1-3 months" = medium, "just looking/no timeline" = low
    - Budget: clearly stated budget matching or above price range = high, vague or below range = medium/low
    - Intent: buying or renting with clear requirements = higher score than general enquiry
    - Combine all factors. Ready buyer with matching budget = 8-10. Interested but timeline unclear = 5-7. Just browsing = 1-4.
