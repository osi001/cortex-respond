business:
  name: "SmileCraft Dental NY"
  industry: "Dental Clinic"
  tagline: "Modern dental care in Manhattan"
  greeting: "Hi! Welcome to SmileCraft Dental. How can I help you today?"
  brand_color: "#0ea5e9"

region:
  name: "newyork"
  city: "New York"
  currency_symbol: "$"
  currency_code: "USD"
  phone_format_example: "+1 (212) 555-0123"
  example_areas:
    - "Brooklyn"
    - "Manhattan"
    - "Queens"
    - "Williamsburg"
    - "Upper East Side"
    - "Astoria"

services:
  - name: "General Consultation"
    price_range: "$150 - $300"
    duration: "30–45 minutes"
  - name: "Teeth Whitening"
    price_range: "$500 - $1,200"
    duration: "1–2 sessions"
  - name: "Dental Implants"
    price_range: "$3,500 - $6,000 per tooth"
    duration: "3–6 months full process"
  - name: "Braces / Orthodontics"
    price_range: "$3,500 - $8,000"
    duration: "12–24 months"
  - name: "Root Canal Treatment"
    price_range: "$900 - $2,200"
    duration: "1–3 sessions"
  - name: "Dental Veneers"
    price_range: "$1,200 - $2,500 per tooth"
    duration: "2 appointments"

faqs:
  - q: "Where are you located?"
    a: "We're in Manhattan. Full address sent on booking confirmation."
  - q: "Do you accept insurance?"
    a: "Yes — we accept Delta Dental, Cigna, Aetna, MetLife, and several others."
  - q: "Is teeth whitening painful?"
    a: "No — it's non-invasive. Some patients have mild sensitivity for 24 hours."
  - q: "How long does a consultation take?"
    a: "Initial consultations are 30–45 minutes including X-rays if needed."
  - q: "What are your opening hours?"
    a: "Monday–Friday 8am–7pm, Saturday 9am–3pm."

scoring:
  rules: |
    Score the lead 1-10 based on:
    - Urgency: "toothache/pain right now" or "ASAP" = high, "this week/month" = medium, "just enquiring" = low
    - Budget: clearly stated budget matching service range = high, vague or no budget mentioned = medium
    - Intent: specific treatment in mind = higher score than general curiosity
    - Combine all factors. Patient in pain with budget = 8-10. Interested in elective procedure with timeline = 5-7. General enquiry only = 1-4.
