  industry: "Real Estate"
  tagline: "Premium residential sales and lettings across central London"
  greeting: "Hi! Welcome to Apex Properties. What can I help you with today?"
  brand_color: "#4F46E5"

region:
  name: "london"
  city: "London"
  currency_symbol: "£"
  currency_code: "GBP"
  phone_format_example: "+44 20 7946 0123"
  example_areas:
    - "Camden"
    - "Shoreditch"
    - "Islington"
    - "Hackney"
    - "Kensington"
