faqs:
  - q: "Where are you located?"
    a: "We're on Victoria Island, Lagos. Full address sent on booking confirmation."
  - q: "Do you accept HMO?"
    a: "Yes — we accept Hygeia, Reliance HMO, AXA Mansard, and several others."
  - q: "Is teeth whitening painful?"
    a: "No — it's non-invasive. Some patients experience mild sensitivity for 24 hours."
  - q: "How long does a consultation take?"
    a: "Initial consultations are 30–45 minutes including X-rays if needed."
  - q: "What are your opening hours?"
    a: "Monday–Friday 8am–6pm, Saturday 9am–2pm."

scoring:
  rules: |
    Score the lead 1-10 based on:
    - Urgency: "toothache/pain right now" or "ASAP" = high, "this week/month" = medium, "just enquiring" = low
    - Budget: clearly stated budget matching service range = high, vague or no budget mentioned = medium
    - Intent: specific treatment in mind = higher score than general curiosity
    - Combine all factors. Patient in pain with budget = 8-10. Interested in elective procedure with timeline = 5-7. General enquiry only = 1-4.
